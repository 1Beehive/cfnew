name: Generate and Obfuscate Worker Script

on:
  workflow_dispatch:

  push:
    branches:
      - '**'
    paths:
      - '明文源吗'

jobs:
  build-and-obfuscate:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install javascript-obfuscator terser

      - name: Obfuscate and Compress
        run: |
          cat > obfuscate.js << 'EOF'
          const JavaScriptObfuscator = require('javascript-obfuscator');
          const terser = require('terser');
          const fs = require('fs');
          const path = require('path');

          (async () => {

            const sourceFileName = '明文源吗';
            const outputFileName = '少年你相信光吗';

            const sourceFilePath = path.join(
              process.cwd(),
              sourceFileName
            );

            if (!fs.existsSync(sourceFilePath)) {
              console.error(
                `Source file not found: ${sourceFilePath}`
              );
              process.exit(1);
            }

            const originalCode =
              fs.readFileSync(
                sourceFilePath,
                'utf8'
              );

            if (
              !originalCode ||
              originalCode.trim().length === 0
            ) {
              console.error(
                `${sourceFileName} is empty`
              );
              process.exit(1);
            }

            const obfuscationOptions = {

              compact: true,

              controlFlowFlattening: true,
              controlFlowFlatteningThreshold: 0.75,

              deadCodeInjection: false,

              stringArray: true,
              stringArrayEncoding: ['base64'],
              stringArrayThreshold: 1,

              stringArrayRotate: true,
              stringArrayShuffle: true,

              stringArrayWrappersCount: 5,

              renameGlobals: true,

              identifierNamesGenerator:
                'hexadecimal',

              numbersToExpressions: true,

              simplify: true,

              splitStrings: true,
              splitStringsChunkLength: 5,

              unicodeEscapeSequence: false,

              selfDefending: false,

              debugProtection: false,

              disableConsoleOutput: true,

              transformObjectKeys: true,

              target: 'browser'
            };

            console.log(
              'Starting obfuscation...'
            );

            const obfuscatedCode =
              JavaScriptObfuscator
                .obfuscate(
                  originalCode,
                  obfuscationOptions
                )
                .getObfuscatedCode();

            console.log(
              'Starting terser compression...'
            );

            const minified =
              await terser.minify(
                obfuscatedCode,
                {
                  compress: true,
                  mangle: true
                }
              );

            if (
              !minified ||
              !minified.code
            ) {
              console.error(
                'Terser compression failed'
              );
              process.exit(1);
            }

            fs.writeFileSync(
              path.join(
                process.cwd(),
                outputFileName
              ),
              minified.code,
              'utf8'
            );

            console.log(
              `Generated: ${outputFileName}`
            );

          })().catch(err => {
            console.error(err);
            process.exit(1);
          });

          EOF

          node obfuscate.js

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "少年你相信光吗"

          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "部署用这个 [skip ci]"
            git push
          fi
